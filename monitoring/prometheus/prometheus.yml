global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'precificador-api'
    static_configs:
      - targets: ['precificador-api:8000']   # observe: usa o nome do serviço 'api'

rule_files:
  - "/etc/prometheus/alertrules.yml"
